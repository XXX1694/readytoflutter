<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="prepiroshi">
  <!-- Atlas-aligned PWA icon. Indigo→violet brand gradient, white glyph, mint
       accent dot. Full-bleed (no inner padding) so it survives Android's
       maskable crop into circle/squircle. Sized 512×512 — `rsvg-convert`
       rasterises down to 192/180/167 etc. for iOS+Android requirements. -->

  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6366F1"/>
      <stop offset="60%" stop-color="#7C5DEF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background — Android maskable safe area is the central
       80%, so the gradient extends to all edges. -->
  <rect width="512" height="512" fill="url(#g)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Brand mark — Inter `p` lowercase, heavy. Sits inside the safe zone. -->
  <text x="50%" y="65%" text-anchor="middle"
        font-family="-apple-system, 'Inter', system-ui, sans-serif"
        font-size="320" font-weight="700" letter-spacing="-12"
        fill="#FFFFFF">p</text>

  <!-- Mint accent dot — references the heatmap streak indicator. -->
  <circle cx="372" cy="384" r="22" fill="#10B981"/>
</svg>
