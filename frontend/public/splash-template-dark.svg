<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" role="img" aria-label="prepiroshi">
  <!-- Dark-mode splash. iOS picks this when the user's system theme is dark. -->

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#09090B"/>
      <stop offset="100%" stop-color="#0F0F12"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="aurora" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#818CF8" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#A78BFA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg)"/>
  <rect width="1290" height="2796" fill="url(#aurora)"/>

  <g transform="translate(645, 1280)">
    <rect x="-200" y="-200" width="400" height="400" rx="80" fill="url(#glyph)"/>
    <text x="0" y="60" text-anchor="middle"
          font-family="-apple-system, 'Inter', system-ui, sans-serif"
          font-size="280" font-weight="700" letter-spacing="-12"
          fill="#0A0A0C">p</text>
  </g>

  <text x="645" y="1620" text-anchor="middle"
        font-family="-apple-system, 'Inter', system-ui, sans-serif"
        font-size="80" font-weight="600" letter-spacing="-2"
        fill="#FAFAFA">prepiroshi</text>
  <text x="645" y="1700" text-anchor="middle"
        font-family="-apple-system, 'Inter', system-ui, sans-serif"
        font-size="36" font-weight="500" letter-spacing="6"
        fill="#A1A1AA">MOBILE INTERVIEW PREP</text>
</svg>
