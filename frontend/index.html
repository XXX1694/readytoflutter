<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- `maximum-scale=1, user-scalable=no` blocks the iOS Safari zoom-on-input-focus
         behaviour that otherwise zooms the entire viewport when a text field
         is focused. Pair with the 16px+ font-size rule in index.css so the
         input itself never falls under the auto-zoom threshold. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Favicons — SVG for modern browsers, PNG fallbacks for older ones. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/pwa/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/pwa/favicon-16.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#6366F1" />

    <!-- Apple touch icons — multiple sizes for older iOS / iPadOS. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/pwa/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/pwa/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/pwa/apple-touch-icon-120.png" />

    <!-- Theme color tracks the Atlas paper tokens so the iOS status bar /
         Android chrome blend with the app surface. The dark variant flips
         when the system prefers-color-scheme is dark. -->
    <meta name="theme-color" content="#FAFAFB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#09090B" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <!-- iOS PWA hints — when the user "Add to Home Screen", these turn
         the saved app into a standalone fullscreen experience and pick a
         status-bar style that doesn't crash with the paper background. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="prepiroshi" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="prepiroshi" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Manifest is auto-injected by vite-plugin-pwa during the production

         the dev server (which doesn't serve the manifest) doesn't 404. -->

    <title>prepiroshi - Mobile interview prep</title>
