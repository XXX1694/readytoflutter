<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- `maximum-scale=1, user-scalable=no` blocks the iOS Safari zoom-on-input-focus
         behaviour that otherwise zooms the entire viewport when a text field
         is focused. Pair with the 16px+ font-size rule in index.css so the
         input itself never falls under the auto-zoom threshold. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Brand favicon — Atlas monogram. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#0E1627" />
    <link rel="apple-touch-icon" href="/maskable-icon.svg" />

    <!-- Theme color tracks the Atlas paper tokens so the iOS status bar /
         Android chrome blend with the app surface. The dark variant flips
         when the system prefers-color-scheme is dark. -->
    <meta name="theme-color" content="#FAFAFB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#09090B" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <!-- iOS PWA hints — when the user "Add to Home Screen", these turn
         the saved app into a standalone fullscreen experience and pick a
         status-bar style that doesn't crash with the paper background. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="prepiroshi" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="prepiroshi" />
    <meta name="format-detection" content="telephone=no" />

    <title>prepiroshi - Mobile interview prep</title>
    <meta name="description" content="Mobile developer interview workspace — Flutter, Swift / SwiftUI / UIKit, Kotlin / Jetpack Compose, KMP. SRS study, mock-interview simulator, in-app videos, curated knowledge base. Bilingual (EN/RU)." />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="prepiroshi — Mobile Interview Prep" />
    <meta property="og:description" content="A calm, focused workspace for mobile developer interview prep — Flutter, iOS (Swift/SwiftUI/UIKit), Android (Kotlin/Compose), KMP." />
    <meta property="og:image" content="/og.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="prepiroshi — Mobile Interview Prep" />
    <meta name="twitter:description" content="Mobile developer interview prep — Flutter, iOS, Android, KMP." />
    <meta name="twitter:image" content="/og.svg" />

    <!--
      Theme is hydrated synchronously by src/store/prefs.js before React mounts,
      so the .dark / .sepia class lands on <html> in time to avoid FOUC. Fonts
      are self-hosted via @fontsource-variable (loaded from src/index.css).
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
