<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Brand favicon — brutalist Codex monogram (replaces the legacy heart emoji). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#0E1627" />
    <link rel="apple-touch-icon" href="/maskable-icon.svg" />

    <!-- Theme color matches paper / dark paper — kept light by default; the script
         below upgrades it for dark/sepia before paint to avoid a flash. -->
    <meta name="theme-color" content="#FCFAF6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0C1422" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <title>ReadyToFlutter — Codex · Mobile interview prep</title>
    <meta name="description" content="Mobile developer interview workspace — Flutter, Swift / SwiftUI / UIKit, Kotlin / Jetpack Compose, KMP. SRS study, mock-interview simulator, in-app videos, curated knowledge base. Bilingual (EN/RU)." />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ReadyToFlutter — Mobile Interview Prep" />
    <meta property="og:description" content="A calm, focused workspace for mobile developer interview prep — Flutter, iOS (Swift/SwiftUI/UIKit), Android (Kotlin/Compose), KMP." />
    <meta property="og:image" content="/og.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ReadyToFlutter — Mobile Interview Prep" />
    <meta name="twitter:description" content="Mobile developer interview prep — Flutter, iOS, Android, KMP." />
    <meta name="twitter:image" content="/og.svg" />

    <!--
      Theme is hydrated synchronously by src/store/prefs.js before React mounts,
      so the .dark / .sepia class lands on <html> in time to avoid FOUC. Fonts
      are self-hosted via @fontsource-variable (loaded from src/index.css).
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
