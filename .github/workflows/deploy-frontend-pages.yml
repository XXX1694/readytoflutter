name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'backend/data/seed/**'
      - 'backend/scripts/generate-static-data.js'
      - '.github/workflows/deploy-frontend-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages allows only one in-flight deploy. Don't cancel a deploy mid-flight,
# but coalesce queued runs so we don't ship stale builds back-to-back.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Regenerate static-data.json from backend seeds
        # Keeps the Pages build in sync with the canonical backend seed JSON
        # so the no-backend fallback never serves stale questions.
        run: node backend/scripts/generate-static-data.js

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: SPA fallback for Pages
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Post-deploy smoke: hit the deployed URL and check that index.html
      # actually renders the app shell. Catches Pages CDN cache holes,
      # broken base path, or upload artifact corruption.
      - name: Smoke the deployed page
        run: |
          set -euo pipefail
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "Smoking $URL"
          # Pages can take a few seconds to propagate after deploy reports done
          for i in $(seq 1 12); do
            if curl -fsSL "$URL" -o /tmp/index.html; then
              echo "Got 200 from $URL"
              break
            fi
            echo "attempt $i — not yet, sleeping 5s"
            sleep 5
          done
          if ! grep -q '<div id="root"' /tmp/index.html; then
            echo "::error::Deployed index.html missing #root mount."
            head -c 2000 /tmp/index.html
            exit 1
          fi
          echo "Smoke OK."
