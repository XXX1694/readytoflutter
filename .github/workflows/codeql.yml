name: CodeQL

# GitHub-native static analysis. Surfaces injection, prototype-pollution,
# unsafe-deserialization, and other JS/TS security smells. Free for public
# repos and zero-config — uses the default suite.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Tuesdays 06:17 UTC — odd minute keeps us out of the top-of-hour
    # action-runner stampede.
    - cron: '17 6 * * 2'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze · ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality is broader; keep at security-extended so we
          # don't drown in style nits already covered by ESLint.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
